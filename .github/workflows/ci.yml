name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff linter
        run: ruff check src/ agent/ api/ policy/ tests/

      - name: Check Black formatting
        run: black --check src/ agent/ api/ policy/ tests/

      - name: Check import sorting
        run: isort --check-only src/ agent/ api/ policy/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -v
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow_test.db
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
