name: churn-intelligence
channels:
  - conda-forge
  - defaults
dependencies:
  # ── Python ──────────────────────────────────────────────────
  - python=3.11

  # ── Core Scientific (conda-forge for optimized C binaries) ─
  - numpy>=1.25
  - pandas>=2.1
  - scipy>=1.11
  - scikit-learn>=1.3
  - xgboost>=2.0
  - imbalanced-learn>=0.11
  - joblib>=1.3

  # ── Visualization ──────────────────────────────────────────
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.18

  # ── Survival Analysis ──────────────────────────────────────
  - lifelines>=0.28

  # ── Templating ─────────────────────────────────────────────
  - jinja2>=3.1

  # ── Dev Tools ──────────────────────────────────────────────
  - pytest>=7.4
  - pytest-cov>=4.1
  - pytest-asyncio>=0.23
  - black>=23.9
  - ruff>=0.1
  - isort>=5.12
  - pre-commit>=3.5
  - ipykernel>=6.25
  - nbformat>=5.9

  # ── Pip-only packages ──────────────────────────────────────
  - pip
  - pip:
      # --- Experiment Tracking ---
      - mlflow>=2.12.0

      # --- Explainability ---
      - shap>=0.44.0

      # --- Monitoring ---
      - evidently>=0.4.10

      # --- API ---
      - fastapi>=0.110.0
      - "uvicorn[standard]>=0.27.0"
      - pydantic>=2.5.0
      - httpx>=0.27.0

      # --- Streamlit ---
      - streamlit>=1.31.0

      # --- Agent (LangGraph + LangChain) ---
      - langgraph>=0.2.0
      - langchain>=0.2.0
      - langchain-google-genai>=1.0.0
      - langchain-core>=0.2.0

      # --- Gradient Boosting (CatBoost) ---
      - catboost>=1.2.0

      # --- Hyperparameter Optimisation ---
      - optuna>=3.5.0

      # --- Dimensionality Reduction (optional — for PaCMAP embedding in fn_analysis) ---
      - pacmap>=0.7.0

      # --- Utilities ---
      - python-dotenv>=1.0.0
      - kagglehub>=0.2.0
      - loguru>=0.7.0
